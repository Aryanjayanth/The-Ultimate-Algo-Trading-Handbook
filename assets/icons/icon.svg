<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="#030712" />
  
  <!-- Definitions for Gradients -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#7000ff" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="trend-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7000ff" />
      <stop offset="50%" stop-color="#a78bfa" />
      <stop offset="100%" stop-color="#22d3ee" />
    </linearGradient>
  </defs>

  <!-- Volatility Glow -->
  <circle cx="256" cy="256" r="200" fill="url(#glow)" />

  <!-- Grid lines -->
  <g stroke="rgba(255,255,255,0.05)" stroke-width="2">
    <line x1="96" y1="128" x2="416" y2="128" />
    <line x1="96" y1="192" x2="416" y2="192" />
    <line x1="96" y1="256" x2="416" y2="256" />
    <line x1="96" y1="320" x2="416" y2="320" />
    <line x1="96" y1="384" x2="416" y2="384" />
    
    <line x1="128" y1="96" x2="128" y2="416" />
    <line x1="192" y1="96" x2="192" y2="416" />
    <line x1="256" y1="96" x2="256" y2="416" />
    <line x1="320" y1="96" x2="320" y2="416" />
    <line x1="384" y1="96" x2="384" y2="416" />
  </g>

  <!-- Simulated Price Candles / Bars (Quant theme) -->
  <g fill="none" stroke-linecap="round">
    <!-- Candle 1 -->
    <line x1="160" y1="330" x2="160" y2="380" stroke="#f87171" stroke-width="4" />
    <rect x="152" y="340" width="16" height="30" fill="#f87171" rx="2" />

    <!-- Candle 2 -->
    <line x1="224" y1="280" x2="224" y2="350" stroke="#34d399" stroke-width="4" />
    <rect x="216" y="290" width="16" height="45" fill="#34d399" rx="2" />

    <!-- Candle 3 -->
    <line x1="288" y1="220" x2="288" y2="310" stroke="#34d399" stroke-width="4" />
    <rect x="280" y="235" width="16" height="55" fill="#34d399" rx="2" />

    <!-- Candle 4 -->
    <line x1="352" y1="140" x2="352" y2="250" stroke="#34d399" stroke-width="4" />
    <rect x="344" y="155" width="16" height="75" fill="#34d399" rx="2" />
  </g>

  <!-- Vectorized Growth Trend Path -->
  <path d="M 128 390 Q 224 360 288 240 T 400 130" fill="none" stroke="url(#trend-grad)" stroke-width="12" stroke-linecap="round" />
  
  <!-- Glowing Bull Eye / Apex point -->
  <circle cx="400" cy="130" r="10" fill="#22d3ee" />
  <circle cx="400" cy="130" r="22" fill="none" stroke="#22d3ee" stroke-width="3" opacity="0.5" />
</svg>
